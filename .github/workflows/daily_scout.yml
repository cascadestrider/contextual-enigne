name: Daily Ad Scout

on:
  schedule:
    - cron: '0 11 * * *'  # 6am EST (UTC-5)
  workflow_dispatch:        # allows manual trigger from GitHub

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 groq python-dotenv google-search-results apscheduler

      - name: Run scout
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: python my_prototype_v2.py --once

      - name: Commit results
        run: |
          git config --global user.email "scout@github-actions.com"
          git config --global user.name "Ad Scout Bot"
          git add reports/ scout_log.db
          git diff --staged --quiet || git commit -m "Scout run $(date +'%Y-%m-%d')"
          git push
